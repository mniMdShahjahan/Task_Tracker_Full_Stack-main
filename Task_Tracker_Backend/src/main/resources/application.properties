spring.application.name=Harsh Task App

# Database from environment variables on Railway,
# from application-local.properties locally
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.notification.recipient=${SPRING_MAIL_USERNAME}

# JWT
jwt.access.secret=${JWT_ACCESS_SECRET}
jwt.access.expiry.minutes=${JWT_ACCESS_EXPIRY_MINUTES:15}
jwt.refresh.expiry.days=${JWT_REFRESH_EXPIRY_DAYS:7}
jwt.refresh.cookie.name=${JWT_REFRESH_COOKIE_NAME:refresh_token}
jwt.refresh.cookie.secure=true

# App settings
app.timezone=Asia/Kolkata
server.error.include-message=always
server.error.include-stacktrace=never
server.error.include-binding-errors=always

# Active profile overridden to 'prod' on Railway
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.security.enabled=false